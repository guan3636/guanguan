<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Li Guan-guan's Space</title>
    <style>
        /* 全域樣式：隱藏溢出以防止背景球造成捲軸 */
        body {
            background: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "PingFang TC", "Helvetica Neue", Helvetica, Arial, "Microsoft JhengHei", sans-serif;
            color: #5a5a5a;
            margin: 0;
            padding: 20px;
            overflow: hidden; /* 防止光暈球產生位移 */
            position: relative;
        }

        /* 裝飾用的背景光暈球 */
        .circle {
            position: absolute;
            width: 400px;
            height: 400px;
            filter: blur(100px);
            z-index: 0;
            border-radius: 50%;
            opacity: 0.5;
        }
        .c1 { background: #ffdfdf; top: -10%; left: -10%; }
        .c2 { background: #d0e8ff; bottom: -10%; right: -10%; }

        /* 內容容器：置於背景球之上 */
        .container {
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* 標題樣式：拉開字距增加高級感 */
        h1 {
            font-weight: 300;
            letter-spacing: 10px; /* 超質感字間距 */
            color: #444;
            margin: 0;
            text-indent: 10px; /* 修正字距造成的置中偏移 */
        }

        .subtitle {
            font-size: 0.9rem;
            color: #999;
            margin-top: 15px;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        /* 玻璃擬態卡片核心 */
        .glass-card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        /* 連結按鈕樣式 */
        .link-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .link-item {
            text-decoration: none;
            color: #666;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.7);
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* 滑鼠懸停效果 */
        .link-item:hover {
            background: #ffffff;
            color: #222;
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
        }

        footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #bbb;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="circle c1"></div>
    <div class="circle c2"></div>

    <div class="container">
        <h1>HELLO!</h1>
        <p class="subtitle">歡迎大家來到我的網站</p>

        <div class="glass-card">
            <div class="link-group">
                <a href="sketchfab.html" class="link-item">🕺<span>Model SketchFab</span></a>
                <a href="0.babylonViewer Basic.html" class="link-item">🎨 <span>My SketchFab</span></a>
                <a href="1.babylonViewer Select.html" class="link-item">👨‍🚀 <span>I am Astronaut</span></a>
                <a href="2.babylonViewer Navbar.html" class="link-item">📱 <span>Navbar Control</span></a>
            </div>
        </div>

        <footer>
            &copy; 2026 LEE GUAN-GUAN
        </footer>
    </div>

</body>
</html>
