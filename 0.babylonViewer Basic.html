<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My 3D Model: my</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        /* 延續你的優雅設計 */
        body {
            background: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            color: #5a5a5a;
            margin: 0;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        .circle {
            position: absolute; width: 450px; height: 450px;
            filter: blur(100px); z-index: 0; border-radius: 50%; opacity: 0.4;
        }
        .c1 { background: #ffdfdf; top: -10%; left: -5%; }
        .c2 { background: #d0e8ff; bottom: -5%; right: -5%; }

        .container { z-index: 1; width: 100%; max-width: 850px; display: flex; flex-direction: column; align-items: center; }

        h2 { font-weight: 300; letter-spacing: 5px; color: #444; margin-bottom: 30px; text-transform: uppercase; }

        .glass-card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            padding: 25px;
            width: 100%;
            box-sizing: border-box;
        }

        /* 讓模型播放器撐滿卡片 */
        model-viewer {
            width: 100%;
            height: 500px;
            border-radius: 20px;
            --poster-color: transparent;
        }

        .back-link {
            margin-top: 40px; text-decoration: none; color: #888;
            padding: 12px 30px; border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 50px; background: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
        }
        .back-link:hover { background: #fff; color: #222; transform: translateX(-5px); }
    </style>
</head>
<body>

    <div class="circle c1"></div>
    <div class="circle c2"></div>

    <div class="container">
        <h2>Model: my</h2>

        <div class="glass-card">
            <model-viewer 
                src="./models/my.glb" 
                ar 
                camera-controls 
                touch-action="pan-y" 
                autoplay 
                shadow-intensity="1" 
                alt="A 3D model of my">
            </model-viewer>
        </div>

        <a href="index.html" class="back-link">
            <span>←</span> 回到首頁
        </a>
    </div>

</body>
</html>
