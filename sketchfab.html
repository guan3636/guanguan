<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketchfab Showcase - Li Guan-guan</title>
    <style>
        /* 延續首頁的溫柔漸層背景 */
        body {
            background: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            color: #5a5a5a;
            margin: 0;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景裝飾球 */
        .circle {
            position: absolute;
            width: 400px;
            height: 400px;
            filter: blur(100px);
            z-index: 0;
            border-radius: 50%;
            opacity: 0.4;
        }
        .c1 { background: #ffdfdf; top: -10%; left: -5%; }
        .c2 { background: #d0e8ff; bottom: -5%; right: -5%; }

        .container {
            z-index: 1;
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 標題與內文 */
        h1 {
            font-weight: 300;
            letter-spacing: 5px;
            color: #444;
            margin-bottom: 10px;
        }

        .intro-text {
            margin-bottom: 30px;
            color: #888;
            font-size: 1rem;
        }

        /* 玻璃展示卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        /* 模型外框圓角 */
        .sketchfab-embed-wrapper iframe {
            width: 100%;
            height: 500px;
            border-radius: 20px;
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* 底部連結樣式 */
        .model-info {
            margin-top: 15px;
            font-size: 0.9rem;
            text-align: center;
        }

        .model-info a {
            color: #1CAAD9;
            text-decoration: none;
            font-weight: 500;
        }

        /* 回首頁按鈕 */
        .back-btn {
            margin-top: 40px;
            text-decoration: none;
            color: #888;
            padding: 10px 25px;
            border: 1px solid #ccc;
            border-radius: 50px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: #fff;
            color: #444;
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="circle c1"></div>
    <div class="circle c2"></div>

    <div class="container">
        <h1>MODEL DISPLAY</h1>
        <p class="intro-text">我是李關關！請在下方查看我的3D模型</p>

        <div class="glass-card">
            <div class="sketchfab-embed-wrapper">
                <iframe title="leeeee" frameborder="0" allowfullscreen mozallowfullscreen="true" webkitallowfullscreen="true" allow="autoplay; fullscreen; xr-spatial-tracking" xr-spatial-tracking execution-while-out-of-viewport execution-while-not-rendered web-share src="https://sketchfab.com/models/0c79133078124ad9b8addc9e480ef0e1/embed"></iframe>
            </div>
            <div class="model-info">
                <a href="https://sketchfab.com/3d-models/leeeee-0c79133078124ad9b8addc9e480ef0e1" target="_blank">View leeeee</a> on Sketchfab
            </div>
        </div>

        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>

</body>
</html>
